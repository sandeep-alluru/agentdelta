name: Feature Request
description: Propose a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Who experiences it?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about

  - type: dropdown
    id: contribution
    attributes:
      label: Are you willing to implement this?
      options:
        - "Yes — I'll open a PR"
        - "Maybe — if someone helps"
        - "No — just requesting"
    validations:
      required: true
