name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-MiniLM-L6-v2

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Type check (mypy)
        run: mypy src/agentdelta/ --ignore-missing-imports

      - name: Test
        run: pytest tests/ -v --tb=short

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  agent-diff:
    name: Behavioral Regression Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.11-${{ hashFiles('pyproject.toml') }}

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-MiniLM-L6-v2

      - name: Install agentdelta
        run: pip install -e .

      - name: Run behavioral diff (if trace files exist)
        id: diff
        run: |
          if [ -f traces/baseline.jsonl ] && [ -f traces/candidate.jsonl ]; then
            agentdelta diff traces/baseline.jsonl traces/candidate.jsonl \
              --format markdown --exit-code > diff_output.md
            echo "has_traces=true" >> $GITHUB_OUTPUT
            echo "exit_code=$?" >> $GITHUB_OUTPUT
          else
            echo "No trace files found — skipping behavioral diff."
            echo "has_traces=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Post PR comment
        if: steps.diff.outputs.has_traces == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: diff_output.md

      - name: Fail if regression detected
        if: steps.diff.outputs.has_traces == 'true' && steps.diff.outputs.exit_code == '1'
        run: exit 1
